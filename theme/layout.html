<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>{{.Title}} · tveitan</title>
	{{if .Description}}<meta name="description" content="{{.Description}}">{{end}}
	<link rel="stylesheet" href="{{.CSSHref}}">
</head>
<body>
	<div class="scanlines" aria-hidden="true"></div>
	<div class="grid" aria-hidden="true"></div>
	<main class="crt">
		{{.Heading}}
		{{.Nav}}
		<article>{{.Body}}</article>
		{{.Footer}}
	</main>
	<script>
	// Sticker collision pass: stickers are placed by a fixed vertical position
	// (--at) that ignores their height, so two on the same side can collide.
	// Measure each side top-to-bottom and push the lower one down. A partial
	// overlap only looks intentional when the two are tilted differently — so
	// allow overlap when their rotations differ, and force a gap when they're
	// near-parallel (otherwise it reads as a broken stack). Text is untouched.
	(() => {
		const OVERLAP = 22;     // px two differently-tilted stickers may overlap
		const GAP = 14;         // px gap forced between near-parallel stickers
		const ROT_DIFF = 3;     // deg difference to count as "different rotation"
		const rotOf = (s) => parseFloat(s.style.getPropertyValue('--rot')) || 0;
		function layout() {
			const all = [...document.querySelectorAll('.sticker')];
			if (!all.length) return;
			all.forEach(s => { s.style.top = ''; }); // revert to CSS --at
			for (const side of ['left', 'right']) {
				const items = all
					.filter(s => s.classList.contains('side-' + side)
						&& getComputedStyle(s).position === 'absolute')
					.sort((a, b) => a.offsetTop - b.offsetTop);
				let prevBottom = -1e9, prevRot = 0;
				for (const s of items) {
					const rot = rotOf(s);
					const differ = Math.abs(rot - prevRot) >= ROT_DIFF;
					const allow = differ ? OVERLAP : -GAP; // negative = enforce a gap
					let top = s.offsetTop;
					const minTop = prevBottom - allow;
					if (top < minTop) { top = minTop; s.style.top = top + 'px'; }
					prevBottom = top + s.offsetHeight;
					prevRot = rot;
				}
			}
		}
		let t;
		const relayout = () => { clearTimeout(t); t = setTimeout(layout, 80); };
		window.addEventListener('load', layout);
		window.addEventListener('resize', relayout);
		document.querySelectorAll('.sticker img').forEach(img => {
			if (!img.complete) img.addEventListener('load', layout);
		});
	})();
	</script>
</body>
</html>
